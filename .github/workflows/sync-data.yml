name: Sync Synoptic Data

on:
  workflow_dispatch:

concurrency:
  group: synoptic-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log run time (Pacific)
        run: |
          echo "Run timestamp (UTC): $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          TZ=America/Los_Angeles date +"Run timestamp (Pacific): %Y-%m-%d %H:%M:%S %Z"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch recent data
        env:
          SYNOPTIC_API_TOKEN: ${{ secrets.SYNOPTIC_API_TOKEN }}
        run: npm run sync:synoptic -- --recent=1440

      - name: Rebuild data manifest
        run: npm run build:data

      - name: Check for new data
        id: check_changes
        run: |
          if git diff --quiet public/data; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push data
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add public/data/
          git commit -m "Sync Synoptic data: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push
