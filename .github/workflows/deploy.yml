name: Deploy Site

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ['Sync Synoptic Data']
    types: [completed]
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:pages
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment_attempt_1
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - id: wait_before_attempt_2
        if: steps.deployment_attempt_1.outcome == 'failure'
        run: sleep 60
      - id: deployment_attempt_2
        continue-on-error: true
        if: steps.deployment_attempt_1.outcome == 'failure'
        uses: actions/deploy-pages@v4
      - id: wait_before_attempt_3
        if: steps.deployment_attempt_1.outcome == 'failure' && steps.deployment_attempt_2.outcome == 'failure'
        run: sleep 60
      - id: deployment_attempt_3
        continue-on-error: true
        if: steps.deployment_attempt_1.outcome == 'failure' && steps.deployment_attempt_2.outcome == 'failure'
        uses: actions/deploy-pages@v4
      - id: wait_before_attempt_4
        if: steps.deployment_attempt_1.outcome == 'failure' && steps.deployment_attempt_2.outcome == 'failure' && steps.deployment_attempt_3.outcome == 'failure'
        run: sleep 60
      - id: deployment_attempt_4
        continue-on-error: true
        if: steps.deployment_attempt_1.outcome == 'failure' && steps.deployment_attempt_2.outcome == 'failure' && steps.deployment_attempt_3.outcome == 'failure'
        uses: actions/deploy-pages@v4
      - id: wait_before_attempt_5
        if: steps.deployment_attempt_1.outcome == 'failure' && steps.deployment_attempt_2.outcome == 'failure' && steps.deployment_attempt_3.outcome == 'failure' && steps.deployment_attempt_4.outcome == 'failure'
        run: sleep 60
      - id: deployment_attempt_5
        continue-on-error: true
        if: steps.deployment_attempt_1.outcome == 'failure' && steps.deployment_attempt_2.outcome == 'failure' && steps.deployment_attempt_3.outcome == 'failure' && steps.deployment_attempt_4.outcome == 'failure'
        uses: actions/deploy-pages@v4
      - id: deployment
        if: always()
        run: |
          if [ "${{ steps.deployment_attempt_1.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.deployment_attempt_1.outputs.page_url }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.deployment_attempt_2.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.deployment_attempt_2.outputs.page_url }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.deployment_attempt_3.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.deployment_attempt_3.outputs.page_url }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.deployment_attempt_4.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.deployment_attempt_4.outputs.page_url }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.deployment_attempt_5.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.deployment_attempt_5.outputs.page_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "page_url=" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy Attempt Summary
        if: always()
        run: |
          echo "deploy attempt 1: ${{ steps.deployment_attempt_1.outcome }}"
          echo "deploy attempt 2: ${{ steps.deployment_attempt_2.outcome }}"
          echo "deploy attempt 3: ${{ steps.deployment_attempt_3.outcome }}"
          echo "deploy attempt 4: ${{ steps.deployment_attempt_4.outcome }}"
          echo "deploy attempt 5: ${{ steps.deployment_attempt_5.outcome }}"
      - name: Fail if all deploy attempts failed
        if: always() && steps.deployment_attempt_1.outcome == 'failure' && steps.deployment_attempt_2.outcome == 'failure' && steps.deployment_attempt_3.outcome == 'failure' && steps.deployment_attempt_4.outcome == 'failure' && steps.deployment_attempt_5.outcome == 'failure'
        run: |
          echo "::error::GitHub Pages deployment failed after 5 attempts with 60-second backoff"
          exit 1